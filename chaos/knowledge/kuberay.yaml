operator:
  name: ray
  namespace: redhat-ods-applications
  repository: https://github.com/opendatahub-io/kuberay

components:
  - name: kuberay-operator
    controller: KubeRayOperator
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: kuberay-operator
        namespace: redhat-ods-applications
        labels:
          app.kubernetes.io/name: kuberay
          app.kubernetes.io/component: kuberay-operator
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ServiceAccount
        name: kuberay-operator
        namespace: redhat-ods-applications
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        name: kuberay-operator
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: kuberay-operator
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        name: kuberay-operator-gateway-api
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: kuberay-operator-gateway-api
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        name: kuberay-operator-configmap
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: kuberay-operator-configmap
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        name: kuberay-operator-leader-election
        namespace: redhat-ods-applications
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        name: kuberay-operator-leader-election
        namespace: redhat-ods-applications
      - apiVersion: coordination.k8s.io/v1
        kind: Lease
        name: ray-operator-leader
        namespace: redhat-ods-applications
      - apiVersion: v1
        kind: Service
        name: kuberay-operator
        namespace: redhat-ods-applications
      - apiVersion: v1
        kind: Service
        name: kuberay-webhook-service
        namespace: redhat-ods-applications
      - apiVersion: admissionregistration.k8s.io/v1
        kind: MutatingWebhookConfiguration
        name: kuberay-mutating-webhook-configuration
      - apiVersion: security.openshift.io/v1
        kind: SecurityContextConstraints
        name: run-as-ray-user
    webhooks:
      - name: mraycluster.kb.io
        type: mutating
        path: /mutate-ray-io-v1-raycluster
    finalizers:
      - ray.io/finalizer
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: kuberay-operator
          namespace: redhat-ods-applications
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
